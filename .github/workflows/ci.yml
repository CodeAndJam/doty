name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  lint-test-typecheck:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'pnpm'

      - name: Install dependencies (skip native rebuilds)
        run: pnpm install --frozen-lockfile --ignore-scripts

      - name: Lint (Biome)
        run: pnpm lint

      - name: Typecheck
        run: npx tsc --noEmit

      - name: Unit tests
        run: pnpm test -- --exclude electron/qwen-integration.test.ts
